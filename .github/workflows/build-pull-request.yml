
name: Modified Build Pull Request
permissions:
  contents: read
jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
    - name: Check out
      uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: liberica
        cache: maven
    - name: Build with Maven
      run: ./mvnw --batch-mode --update-snapshots verify
'on':
- push
- workflow_dispatch
